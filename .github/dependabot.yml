version: 2
updates:
  # Keep GitHub Actions SHA pins current (security patches to pinned actions).
  - package-ecosystem: github-actions
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]

  # Python dependencies (pyproject.toml).
  - package-ecosystem: pip
    cooldown:
      default-days: 14
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  # Web UI dependencies.
  - package-ecosystem: npm
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    directory: /web-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

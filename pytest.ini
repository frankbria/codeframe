[pytest]
# Pytest configuration for CodeFRAME

# Minimum pytest version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Pytest-asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Strict config (fail on config errors)
    --strict-config
    # Show durations of slowest tests
    --durations=10

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (use real DB and components)
    unit: marks tests as unit tests (mock external dependencies)
    requires_api_key: marks tests that require API keys
    requires_db: marks tests that require database
    requires_subprocess: marks tests that execute subprocess commands
    e2e: marks tests as end-to-end tests
    e2e_llm: marks e2e tests requiring real LLM API calls (expensive, run explicitly)
    asyncio: marks tests as async tests
    v2: marks tests for v2 (CLI-first, headless) functionality
    edge_case: marks edge case tests for boundary conditions and error handling
    lifecycle: full end-to-end lifecycle tests (real LLM calls — run via scripts/lifecycle)

# CI gate (the backend job in .github/workflows/test.yml) runs the full non-e2e
# suite EXCEPT real-LLM lifecycle tests:
#   pytest tests/ --ignore=tests/e2e -m "not lifecycle"
# The `v2` marker is no longer a CI gate (the v1->v2 refactor is done); it stays
# registered for back-compat / ad-hoc selection. Don't rely on it to gate a
# test — anything non-e2e and non-lifecycle runs in CI by default (#669).
#
# To run only unit tests (fast):
#   pytest -m "not integration and not slow and not e2e"
#
# To run only integration tests:
#   pytest -m integration
#
# To run all tests except slow ones:
#   pytest -m "not slow"
#
# To run lifecycle tests (real LLM — use scripts/lifecycle instead):
#   ANTHROPIC_API_KEY=sk-ant-... pytest -m lifecycle

# Coverage warnings
filterwarnings =
    error::DeprecationWarning
    ignore::PendingDeprecationWarning

# Console output formatting
console_output_style = progress
